services:
  - type: web
    name: mathe10-lernapp
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: Admin2025!   # ← Bitte vor dem Deploy ändern!
    disk:
      name: db
      mountPath: /app/data
      sizeGB: 1
